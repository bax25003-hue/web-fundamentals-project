<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <table id="content-table">
          <tr>
            <th>Speaker</th>
            <th>Title</th>
            <th>Location</th>
            <th>Year</th>
          </tr>
          <tr>
            <td>Elder Robert C. Gay</td>
            <td>Be True to the Voice of God</td>
            <td>BYU-Idaho</td>
            <td>2026</td>
          </tr>
          <tr>
            <td>Trent Shippen</td>
            <td>Become Legendary</td>
            <td>BYU-Idaho</td>
            <td>2026</td>
          </tr>
          <tr>
            <td>A Great Check</td>
            <td>Elder B. Corey Cuvelier</td>
            <td>BYU-Idaho</td>
            <td>2026</td>
          </tr>
        </table>
        <form id="content-form">
          <label for="speaker">Speaker</label>
          <input id="speaker" type="text">
          <label for="title">Title</label>
          <input id="title" type="text">
          <input type="submit">
        </form>
      </div>
    </main>
  </div>
</body>
</html>
