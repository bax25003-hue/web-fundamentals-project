<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <link type="text/css" rel="stylesheet" href="styles/style.css"/>
</head>
<body>
    <section id="main-graphic">
        <img id="background-img" src="images/christus.webp" alt="A background picture of the Christus statue"/>
        <div id="first-presidency">
            <h1 class="headers">First Presidency</h1>
            <div id="first-presidency-photos">
                <img class="apostle-photo" id="eyring" src="images/eyring.webp" alt="A picture of President Eyring"/>
                <img class="apostle-photo" id="oaks" src="images/oaks.webp" alt="A picture of Dallin H. Oaks"/>
                <img class="apostle-photo" id="christofferson" src="images/christofferson.webp" alt="A picture of President Christofferson"/>
            </div>
        </div>
        <div id="apostles">
            <h3 class="headers">Quorum of the Twelve Apostles</h3>
            <div id="apostles-photos">
                <img class="apostle-photo" id="uchtdorf" src="images/uchtdorf.webp" alt="A picture of Elder Uchtdorf"/>
                <img class="apostle-photo" id="bednar" src="images/bednar.webp" alt="A picture of Elder Bednar"/>
                <img class="apostle-photo" id="cook" src="images/cook.webp" alt="A picture of Elder Cook"/>
                <img class="apostle-photo" id="andersen" src="images/andersen.webp" alt="A picture of Elder Andersen"/>
                <img class="apostle-photo" id="rasband" src="images/rasband.webp" alt="A picture of Elder Rasband"/>
                <img class="apostle-photo" id="stevenson" src="images/stevenson.webp" alt="A picture of Elder Stevenson"/>
                <img class="apostle-photo" id="renlund" src="images/renlund.webp" alt="A picture of Elder Renlund"/>
                <img class="apostle-photo" id="gong" src="images/gong.webp" alt="A picture of Elder Gong"/>
                <img class="apostle-photo" id="soares" src="images/soares.webp" alt="A picture of Elder Soares"/>
                <img class="apostle-photo" id="kearon" src="images/kearon.webp" alt="A picture of Elder Kearon"/>
                <img class="apostle-photo" id="causse" src="images/causse.webp" alt="A picture of Elder Causee"/>
                <img class="apostle-photo" id="gilbert" src="images/gilbert.webp" alt="A picture of Elder Gilbert"/>
            </div>
        </div>
</section>
</body>
</html>
